name: Deploy Service

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: Cloud Run service name (e.g. "fugue")
      dockerfile_path:
        required: false
        type: string
        default: "./Dockerfile"
        description: Path to the Dockerfile
      service_account:
        required: true
        type: string
        description: Service account email for Cloud Run runtime (e.g. "fugue-runner@project.iam.gserviceaccount.com")

permissions:
  id-token: write
  contents: read

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/realcomplex-prod/realcomplex-images

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/736771798599/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
          service_account: deployer@realcomplex-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image via Cloud Build
        run: |
          IMAGE="${REGISTRY}/${{ inputs.service_name }}:${{ github.sha }}"
          BUILD_ID=$(gcloud builds submit \
            --tag "$IMAGE" \
            --quiet \
            --async \
            --format='value(id)')
          echo "Waiting for build $BUILD_ID..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' --quiet)
            case "$STATUS" in
              SUCCESS) echo "Build succeeded"; break ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED) echo "Build failed: $STATUS"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${REGISTRY}/${{ inputs.service_name }}:${{ github.sha }}"
          gcloud run deploy "${{ inputs.service_name }}" \
            --image "$IMAGE" \
            --region "$REGION" \
            --service-account "${{ inputs.service_account }}" \
            --quiet
